<!DOCTYPE html>
<html lang="en" class="poem">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="A poem">
	<title>Infinite</title>
	
	<link href="../../../Styles/Poem.css" rel="stylesheet" type="text/css">
</head>
<body>
	<header>
		<hgroup class="no-embed">
			<h1>Infinite</h1>
			<p>By Vera, <time>May 17, 2026</time></p>
		</hgroup>
	</header>
	<main id="main">
		<p class="stanza" role="group" aria-label="Stanza">
			<span class="line" role="group" aria-label="Line">I lie along your stretching shore of sand</span>
			<span class="line" role="group" aria-label="Line">And break upon each shell and seaweed strand</span>
			<span class="line" role="group" aria-label="Line">You're spilling out, I'm seeping down within</span>
			<span class="line" role="group" aria-label="Line">That looking low our line will grow again</span>
		</p>
	</main>
	<footer class="no-embed">
			<a href="https://groundedwren.com/" class="gw-button">
				<img
					src="https://groundedwren.com/Img/Buttons/gw-button.png"
					alt="Grounded Wren 88x31 Button; white text on a swirling purple, red, and black background"
				>
			</a>
	</footer>
</body>
</html>
