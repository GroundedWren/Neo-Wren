<!DOCTYPE html>
<html lang="en" class="poem">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="A poem">
	<title>Kindred</title>
	
	<link href="../../../Styles/Poem.css" rel="stylesheet" type="text/css">
</head>
<body>
	<header>
		<hgroup class="no-embed">
			<h1>Kindred</h1>
			<p>By Vera, <time>May 17, 2026</time></p>
		</hgroup>
	</header>
	<main id="main">
		<p class="stanza" role="group" aria-label="Stanza">
			<span class="line" role="group" aria-label="Line">A lithic core, a knapping hand</span>
			<span class="line" role="group" aria-label="Line">A rotting floor, a scraping sand</span>
			<span class="line" role="group" aria-label="Line">A minute here, a billion there</span>
			<span class="line" role="group" aria-label="Line">A partial mirror, a piercing stare</span>
		</p>
		<p class="stanza" role="group" aria-label="Stanza">
			<span class="line" role="group" aria-label="Line">A bone, a cut, a cast, a break</span>
			<span class="line" role="group" aria-label="Line">A fate beyond a fatal ache</span>
			<span class="line" role="group" aria-label="Line">A fleeting mind, a fleshy heart</span>
			<span class="line" role="group" aria-label="Line">A will, a wish, a love, an art</span>
		</p>
	</main>
	<footer class="no-embed">
			<a href="https://groundedwren.com/" class="gw-button">
				<img
					src="https://groundedwren.com/Img/Buttons/gw-button.png"
					alt="Grounded Wren 88x31 Button; white text on a swirling purple, red, and black background"
				>
			</a>
	</footer>
</body>
</html>
