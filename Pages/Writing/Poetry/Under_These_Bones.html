<!DOCTYPE html>
<html lang="en" class="poem">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="A poem">
	<title>Under These Bones</title>
	
	<link href="../../../Styles/Poem.css" rel="stylesheet" type="text/css">
</head>
<body>
	<header>
		<hgroup class="no-embed">
			<h1>Under These Bones</h1>
			<p>By Vera, <time>May 17, 2026</time></p>
		</hgroup>
	</header>
	<main id="main">
		<p class="stanza" role="group" aria-label="Stanza">
			<span class="line" role="group" aria-label="Line">A blanket wrapped around our vital heat</span>
			<span class="line" role="group" aria-label="Line">Our nerves and blood in fleshy fatty meat</span>
			<span class="line" role="group" aria-label="Line">But with this touch it's you and me discrete</span>
			<span class="line" role="group" aria-label="Line">So let me in your sealing skin to meet</span>
			<span class="line" role="group" aria-label="Line">Under these bones it's us and our heartbeat</span>
		</p>
	</main>
	<footer class="no-embed">
			<a href="https://groundedwren.com/" class="gw-button">
				<img
					src="https://groundedwren.com/Img/Buttons/gw-button.png"
					alt="Grounded Wren 88x31 Button; white text on a swirling purple, red, and black background"
				>
			</a>
	</footer>
</body>
</html>
